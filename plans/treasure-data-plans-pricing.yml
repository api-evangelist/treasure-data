name: Treasure Data Plans and Pricing
description: Pricing plans for Treasure AI (formerly Treasure Data) Customer Data Platform. All plans are annual enterprise subscriptions priced by customer profiles and behavioral events rather than compute or query volume.
specificationVersion: '0.1'
url: https://www.treasure.ai/product/pricing/
plans:
  - name: Intelligent Customer Data Platform
    description: Core CDP tier for unified data ingestion, profile unification, segmentation, audience management, and batch activation. Priced annually based on unified profiles and behavioral events.
    url: https://www.treasure.ai/product/pricing/
    pricingModel: subscription
    billingCycle: annual
    pricingPage: https://www.treasure.ai/product/pricing/
    contactSales: true
    features:
      - Unified data ingestion and profile unification
      - Segmentation and audience management
      - Batch audience activation
      - Journey orchestration
      - AI Agent Foundry access
      - Security and governance controls
      - Treasure Insights analytics
      - QA and Dev sandboxes
      - TD API access (databases, tables, jobs, bulk import)
      - Postback API
      - Treasure Workflow API
      - SDK access (JavaScript, iOS, Android, React Native)
  - name: Intelligent CDP Plus AI Suites
    description: CDP plan bundled with AI-powered activation suites for engagement, personalization, creative, paid media, and service use cases. Fixed annual license per suite plus consumption-based AI credits.
    url: https://www.treasure.ai/product/pricing/
    pricingModel: subscription
    billingCycle: annual
    pricingPage: https://www.treasure.ai/product/pricing/
    contactSales: true
    features:
      - All Intelligent CDP features
      - Engagement AI Suite
      - Personalization AI Suite
      - Creative AI Suite
      - Paid Media AI Suite
      - Service AI Suite
      - 600 conversations per AI Credit
      - Unified billing across all AI applications
  - name: Treasure AI Studio
    description: Usage-based AI workspace included with any plan. No additional license or seat fee. Access via web, mobile (iOS), and desktop (Mac) with 50+ pre-built skills and persistent conversations.
    url: https://www.treasure.ai/product/pricing/
    pricingModel: consumption
    billingCycle: annual
    pricingPage: https://www.treasure.ai/product/pricing/
    contactSales: false
    price: 0
    features:
      - Free workspace — no license or seat fee
      - Web, mobile (iOS), and desktop (Mac) access
      - 50+ pre-built skills
      - Persistent conversations and memory
      - Included with any Treasure AI plan
notes:
  - Treasure AI uses "no-compute pricing" — charges based on customer profiles and behavioral events, not query volume or processing power.
  - Enterprise plans range approximately USD 100,000–750,000 per year based on data volume and features.
  - A Treasure AI Trade-Up Program offers discounted pricing for customers switching from legacy CDPs, ESPs, or CEPs.
  - Specific pricing requires contact with Treasure AI sales for a custom quote.
