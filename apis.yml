name: Treasure Data
description: Enterprise customer data platform (now Treasure AI) with a REST API for managing jobs, databases, tables, bulk import, authentication, and running Presto or Hive queries on big data.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/treasure-data/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
aid: treasure-data
tags:
  - Customer Data Platform
  - CDP
  - Big Data
  - Data Warehouse
  - Hive
  - Presto
  - Enterprise
  - AI
  - Marketing
  - Analytics
apis:
  - name: Treasure Data TD API
    description: Core REST API for managing databases, tables, jobs, bulk imports, connectors, and users within the Treasure Data Customer Data Platform.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.treasure.ai/apis/td-api
    baseURL: https://api.treasuredata.com/v3
    tags:
      - Databases
      - Tables
      - Jobs
      - Bulk Import
      - Authentication
      - Presto
      - Hive
    properties:
      - type: Documentation
        url: https://docs.treasure.ai/apis/td-api
      - type: OpenAPI
        url: https://api-docs.treasuredata.com/
  - name: Treasure Data Bulk Loads API
    description: REST API for configuring and managing bulk load sessions that import data from external sources into Treasure Data.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.treasure.ai/apis/td-api/bulk-loads-api
    baseURL: https://api.treasuredata.com/v3/bulk_loads
    tags:
      - Bulk Import
      - Data Ingestion
      - ETL
    properties:
      - type: Documentation
        url: https://docs.treasure.ai/apis/td-api/bulk-loads-api
  - name: Treasure Data User API
    description: REST API for managing users, access control, and authentication within a Treasure Data account.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.treasure.ai/apis/td-api/user-api
    baseURL: https://api.treasuredata.com/v3/user
    tags:
      - Users
      - Authentication
      - Access Control
    properties:
      - type: Documentation
        url: https://docs.treasure.ai/apis/td-api/user-api
  - name: Treasure Data System API
    description: REST API for checking server health and infrastructure status of the Treasure Data platform.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.treasure.ai/apis/td-api/system-api
    baseURL: https://api.treasuredata.com/v3/system
    tags:
      - System
      - Health
      - Status
    properties:
      - type: Documentation
        url: https://docs.treasure.ai/apis/td-api/system-api
  - name: Treasure Data Postback API
    description: JSON-based event ingestion API for submitting data records to Treasure Data from systems that cannot use the JavaScript SDK.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.treasure.ai/apis
    baseURL: https://api.treasuredata.com
    tags:
      - Events
      - Data Ingestion
      - JSON
    properties:
      - type: Documentation
        url: https://docs.treasure.ai/apis
  - name: Treasure Workflow API
    description: REST API for orchestrating and automating data workflows within the Treasure Data platform using Digdag-based workflow engine.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.treasure.ai/apis
    baseURL: https://api.treasuredata.com
    tags:
      - Workflows
      - Orchestration
      - Automation
      - Digdag
    properties:
      - type: Documentation
        url: https://docs.treasure.ai/apis
